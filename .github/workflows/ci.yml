name: Java CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          echo "jwt.secret=${{ secrets.JWT_SECRET }}" >> src/main/resources/application.properties
          echo "jwt.expiration=3000000" >> src/main/resources/application.properties
          echo "telegram.bot.token=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> src/main/resources/application.properties
          echo "telegram.chat.id=${{ secrets.TELEGRAM_CHAT_ID }}" >> src/main/resources/application.properties
          echo "stripe.secret.key=${{ secrets.STRIPE_SECRET_KEY }}" >> src/main/resources/application.properties
          echo "app.base-url=${{ secrets.APP_BASE_URL }}" >> src/main/resources/application.properties
          echo "fine.multiplier=${{ secrets.FINE_MULTIPLIER }}" >> src/main/resources/application.properties

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify
