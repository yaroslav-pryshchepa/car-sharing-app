databaseChangeLog:
  - changeSet:
      id: 07-create-rentals-table
      author: yaroslav-pryshchepa
      changes:
        - createTable:
            tableName: rentals
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: rental_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: return_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: actual_return_date
                  type: DATE
                  constraints:
                    nullable: true

              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rentals_car
                    referencedTableName: cars
                    referencedColumnNames: id

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rentals_user
                    referencedTableName: users
                    referencedColumnNames: id

              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
